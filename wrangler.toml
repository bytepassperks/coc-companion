name = "coc-companion"
main = "src/index.ts"
compatibility_date = "2026-07-21"

[vars]
AI_DAILY_CAP = "8000"
COC_API_BASE_URL = "https://cocproxy.royaleapi.dev/v1"

[[kv_namespaces]]
binding = "STATE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

[ai]
binding = "AI"

[triggers]
crons = ["*/5 * * * *"]
